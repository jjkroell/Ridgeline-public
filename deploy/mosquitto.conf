# Ridgeline's observer broker. Anonymous by default so MeshCore observer nodes
# can publish without credentials — fine when the WebSocket listener is only
# reachable over TLS (via Caddy or a tunnel). If you expose it more broadly,
# add authentication here.

# Internal plain MQTT for the Ridgeline ingestor (compose network only —
# not published to the host, reached as mosquitto:1883 by ridgelined).
listener 1883 0.0.0.0

# External MQTT-over-WebSockets for observer nodes (published on host :9001).
listener 9001 0.0.0.0
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type error
log_type information
